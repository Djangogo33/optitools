<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 150">
  <!-- Bulb Icon -->
  <g transform="translate(30, 20)">
    <!-- Bulb glow effect (rays) -->
    <g stroke="#0069f6" stroke-width="6" stroke-linecap="round">
      <line x1="35" y1="-15" x2="35" y2="-35"/>
      <line x1="55" y1="-5" x2="70" y2="-20"/>
      <line x1="60" y1="20" x2="80" y2="20"/>
      <line x1="55" y1="45" x2="70" y2="60"/>
      <line x1="35" y1="55" x2="35" y2="75"/>
      <line x1="15" y1="45" x2="0" y2="60"/>
      <line x1="10" y1="20" x2="-10" y2="20"/>
      <line x1="15" y1="-5" x2="0" y2="-20"/>
    </g>
    
    <!-- Bulb outer circle (blue) -->
    <circle cx="35" cy="20" r="28" fill="none" stroke="#0069f6" stroke-width="6"/>
    
    <!-- Bulb inner circle (yellow) -->
    <circle cx="35" cy="20" r="22" fill="#FFD700"/>
    
    <!-- Filament (white) -->
    <g stroke="white" stroke-width="3" fill="none" stroke-linecap="round">
      <path d="M 25 10 Q 20 15 25 20 Q 30 25 25 30"/>
      <path d="M 35 10 L 35 30"/>
      <path d="M 45 10 Q 50 15 45 20 Q 40 25 45 30"/>
    </g>
    
    <!-- Base ring (blue) -->
    <rect x="20" y="42" width="30" height="8" fill="#0069f6" rx="2"/>
    
    <!-- Base socket (blue) -->
    <rect x="24" y="50" width="22" height="16" fill="#0069f6" rx="3"/>
    
    <!-- Socket details (white) -->
    <rect x="27" y="52" width="16" height="4" fill="white" rx="1"/>
  </g>

  <!-- Text Logo -->
  <text x="120" y="90" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#0069f6">TutoFacile</text>
</svg>
