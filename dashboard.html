<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <!-- Anti-flash dark mode -->
  <script>if(localStorage.getItem("tf_dark")==="true")document.documentElement.classList.add("dark");</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — TutoFacile</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/nav.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>

<header class="site-header">
  <div class="container nav-inner">
    <a href="index.html" class="nav-logo"><div class="nav-logo-icon">🎓</div>TutoFacile</a>
    <nav class="nav-links">
      <a href="index.html"      class="nav-link">Accueil</a>
      <a href="contribute.html" class="nav-link">Contribuer</a>
    </nav>
    <div class="nav-actions">
      <div class="lang-switch">
        <button class="lang-btn" data-lang="fr">🇫🇷</button>
        <button class="lang-btn" data-lang="en">🇬🇧</button>
      </div>
      <button class="dark-toggle">🌙</button>
      <span id="nav-username" style="font-weight:600;font-size:0.9rem"></span>
      <button class="btn btn-ghost btn-sm" id="nav-logout">Déconnexion</button>
    </div>
    <button class="nav-burger" id="nav-burger"><span></span><span></span><span></span></button>
  </div>
</header>

<div class="container dashboard-layout">

  <!-- Sidebar -->
  <aside class="dashboard-sidebar">
    <div id="user-card" style="padding:20px;background:var(--bg-soft);border:1px solid var(--border);border-radius:var(--r-lg);margin-bottom:20px;text-align:center">
      <div style="width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;font-size:1.4rem;font-weight:700;display:flex;align-items:center;justify-content:center;margin:0 auto 10px" id="user-avatar-big">?</div>
      <div style="font-weight:700" id="user-name-big">—</div>
      <div style="font-size:0.8rem;color:var(--text-light)" id="user-email-big">—</div>
    </div>

    <nav class="sidebar-nav">
      <a class="sidebar-link active" data-tab="my-tutos">
        <span class="icon">📚</span> Mes tutoriels
      </a>
      <a class="sidebar-link" data-tab="create">
        <span class="icon">➕</span> Créer un tuto
      </a>
      <a class="sidebar-link" data-tab="settings">
        <span class="icon">⚙️</span> Paramètres
      </a>
    </nav>
  </aside>

  <!-- Contenu principal -->
  <main class="dashboard-main">

    <!-- Mes tutoriels -->
    <div class="dash-section active" id="tab-my-tutos">
      <div class="dash-section-header">
        <h2>📚 Mes tutoriels</h2>
        <button class="btn btn-primary btn-sm" onclick="switchTab('create')">+ Créer</button>
      </div>
      <div id="my-tutos-list">
        <div class="loader"></div>
      </div>
    </div>

    <!-- Créer un tutoriel -->
    <div class="dash-section" id="tab-create">
      <div class="dash-section-header">
        <h2 id="form-title">➕ Créer un tutoriel</h2>
      </div>
      <div style="background:var(--bg);border:1px solid var(--border);border-radius:var(--r-xl);padding:2rem">
        <input type="hidden" id="edit-id">

        <div class="form-group">
          <label>Titre <span style="color:var(--danger)">*</span></label>
          <input type="text" id="f-titre" class="form-control" placeholder="Un titre clair et accrocheur">
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px">
          <div class="form-group">
            <label>Catégorie</label>
            <select id="f-cat" class="form-control">
              <option>Bricolage</option>
              <option>Cuisine</option>
              <option>Code</option>
              <option>Jardinage</option>
              <option>Bien-être</option>
              <option>Électronique</option>
              <option>Autre</option>
            </select>
          </div>
          <div class="form-group">
            <label>Difficulté</label>
            <select id="f-diff" class="form-control">
              <option>Facile</option>
              <option>Moyen</option>
              <option>Difficile</option>
            </select>
          </div>
          <div class="form-group">
            <label>Durée (min)</label>
            <input type="number" id="f-time" class="form-control" value="15" min="1" max="300">
          </div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
          <div class="form-group">
            <label>Emoji représentatif</label>
            <input type="text" id="f-emoji" class="form-control" value="📚" placeholder="📚">
          </div>
          <div class="form-group">
            <label>URL image de couverture</label>
            <input type="url" id="f-image" class="form-control" placeholder="https://...">
          </div>
        </div>

        <div class="form-group">
          <label>Description courte <span style="color:var(--danger)">*</span></label>
          <textarea id="f-desc" class="form-control" rows="2" placeholder="Résumez votre tutoriel en 1-2 phrases"></textarea>
        </div>

        <div class="form-group">
          <label>Contenu détaillé <span style="color:var(--danger)">*</span></label>
          <div style="display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap">
            <button type="button" class="btn btn-ghost btn-sm" onclick="ins('<h2>Titre</h2>')">H2</button>
            <button type="button" class="btn btn-ghost btn-sm" onclick="ins('<h3>Sous-titre</h3>')">H3</button>
            <button type="button" class="btn btn-ghost btn-sm" onclick="ins('<p>Paragraphe</p>')">¶</button>
            <button type="button" class="btn btn-ghost btn-sm" onclick="ins('<ul>\n  <li>Élément</li>\n</ul>')">Liste</button>
            <button type="button" class="btn btn-ghost btn-sm" onclick="ins('<strong>texte</strong>')"><b>Gras</b></button>
            <button type="button" class="btn btn-ghost btn-sm" onclick="ins('<code>code</code>')">Code</button>
            <button type="button" class="btn btn-ghost btn-sm" onclick="ins('<pre>bloc de code</pre>')">Pre</button>
          </div>
          <textarea id="f-content" class="form-control" rows="12" placeholder="Écris ton tutoriel ici en HTML. Utilise les boutons au-dessus pour insérer des balises."></textarea>
        </div>

        <div class="form-group">
          <label>Visibilité</label>
          <div style="display:flex;gap:10px;margin-top:6px">
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:10px 16px;border:2px solid var(--border);border-radius:var(--r-md);flex:1;transition:all var(--t)" id="vis-private-label">
              <input type="radio" name="f-visibility" id="f-vis-private" value="private" checked onchange="highlightVis()">
              <span>🔒 <strong>Privé</strong> — visible uniquement par vous</span>
            </label>
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:10px 16px;border:2px solid var(--border);border-radius:var(--r-md);flex:1;transition:all var(--t)" id="vis-public-label">
              <input type="radio" name="f-visibility" id="f-vis-public" value="public" onchange="highlightVis()">
              <span>🌍 <strong>Public</strong> — visible par tous</span>
            </label>
          </div>
        </div>

        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <button class="btn btn-primary btn-lg" onclick="saveTuto()">💾 Enregistrer</button>
          <button class="btn btn-ghost" onclick="resetForm()">Annuler</button>
        </div>
      </div>
    </div>

    <!-- Paramètres -->
    <div class="dash-section" id="tab-settings">
      <div class="dash-section-header"><h2>⚙️ Paramètres</h2></div>
      <div style="background:var(--bg);border:1px solid var(--border);border-radius:var(--r-xl);padding:2rem;max-width:480px">
        <h3 style="margin-bottom:1.5rem">Changer le mot de passe</h3>
        <div id="pwd-error"   class="alert alert-danger"  style="display:none"></div>
        <div id="pwd-success" class="alert alert-success" style="display:none"></div>
        <div class="form-group">
          <label>Mot de passe actuel</label>
          <input type="password" id="pwd-old" class="form-control">
        </div>
        <div class="form-group">
          <label>Nouveau mot de passe</label>
          <input type="password" id="pwd-new" class="form-control">
        </div>
        <div class="form-group">
          <label>Confirmer</label>
          <input type="password" id="pwd-new2" class="form-control">
        </div>
        <button class="btn btn-primary" onclick="changePwd()">Mettre à jour</button>

        <div class="divider"></div>
        <h3 style="margin-bottom:1rem">Danger zone</h3>
        <button class="btn btn-danger" onclick="doLogoutBtn()">🚪 Se déconnecter</button>
      </div>
    </div>

  </main>
</div>

<script src="js/nav.js"></script>
<script src="js/auth.js"></script>
<script src="js/data.js"></script>
<script>
let currentUser = null;

/* ── Init ── */
Auth.getCurrentUser().then(user => {
  if (!user) { window.location.href = 'login.html'; return; }
  currentUser = user;

  document.getElementById('user-avatar-big').textContent = user.username[0].toUpperCase();
  document.getElementById('user-name-big').textContent   = user.username;
  document.getElementById('user-email-big').textContent  = user.email;

  const navU = document.getElementById('nav-username');
  if (navU) navU.textContent = user.username;

  loadMyTutos();
});

document.getElementById('nav-logout')?.addEventListener('click', doLogoutBtn);

function doLogoutBtn() {
  Auth.logout();
  window.location.href = 'index.html';
}

/* ── Tabs ── */
function switchTab(name) {
  document.querySelectorAll('.sidebar-link').forEach(l => l.classList.toggle('active', l.dataset.tab === name));
  document.querySelectorAll('.dash-section').forEach(s => s.classList.toggle('active', s.id === 'tab-' + name));
}
document.querySelectorAll('.sidebar-link').forEach(l => {
  l.addEventListener('click', () => switchTab(l.dataset.tab));
});

/* ── Liste mes tutos ── */
async function loadMyTutos() {
  if (!currentUser) return;
  const tutos = TutoData.getUserTutos(currentUser.id);
  const el    = document.getElementById('my-tutos-list');

  if (!tutos.length) {
    el.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📭</div>
        <h3>Aucun tutoriel</h3>
        <p style="color:var(--text-light)">Crée ton premier tutoriel !</p>
        <button class="btn btn-primary" style="margin-top:16px" onclick="switchTab('create')">+ Créer</button>
      </div>`;
    return;
  }

  el.innerHTML = `
    <table class="tuto-table">
      <thead><tr>
        <th>Tutoriel</th><th>Catégorie</th><th>Difficulté</th><th>Visibilité</th><th>Vues</th><th>Actions</th>
      </tr></thead>
      <tbody>
        ${tutos.map(t => `
          <tr>
            <td><strong>${t.titre}</strong><br><small style="color:var(--text-light)">${(t.description||'').slice(0,50)}…</small></td>
            <td>${t.categorie||'—'}</td>
            <td><span class="badge badge-${t.difficulty==='Facile'?'success':t.difficulty==='Moyen'?'warning':'danger'}">${t.difficulty||'—'}</span></td>
            <td>${t.published ? '<span class="badge badge-success">🌍 Public</span>' : '<span class="badge" style="background:var(--bg-muted);color:var(--text-light);border:1px solid var(--border)">🔒 Privé</span>'}</td>
            <td>👁️ ${t.views||0}</td>
            <td class="td-actions">
              <a href="tuto.html?id=${t.id}" class="btn btn-ghost btn-sm">👁️</a>
              <button class="btn btn-ghost btn-sm" onclick="editTuto('${t.id}')">✏️</button>
              <button class="btn btn-danger btn-sm" onclick="deleteTuto('${t.id}')">🗑️</button>
            </td>
          </tr>`).join('')}
      </tbody>
    </table>`;
}

/* ── Visibilité ── */
function highlightVis() {
  const isPrivate = document.getElementById('f-vis-private').checked;
  document.getElementById('vis-private-label').style.borderColor = isPrivate ? 'var(--warning)' : 'var(--border)';
  document.getElementById('vis-private-label').style.background   = isPrivate ? 'rgba(245,158,11,0.08)' : '';
  document.getElementById('vis-public-label').style.borderColor  = !isPrivate ? 'var(--success)' : 'var(--border)';
  document.getElementById('vis-public-label').style.background    = !isPrivate ? 'rgba(34,197,94,0.08)' : '';
}
/* Appliquer la mise en forme initiale */
document.addEventListener('DOMContentLoaded', highlightVis);

/* ── Créer / modifier ── */
function ins(html) {
  const ta   = document.getElementById('f-content');
  const s    = ta.selectionStart;
  const e    = ta.selectionEnd;
  ta.value   = ta.value.slice(0,s) + html + ta.value.slice(e);
  ta.selectionStart = ta.selectionEnd = s + html.length;
  ta.focus();
}

async function saveTuto() {
  const id        = document.getElementById('edit-id').value;
  const titre     = document.getElementById('f-titre').value.trim();
  const desc      = document.getElementById('f-desc').value.trim();
  const content   = document.getElementById('f-content').value.trim();
  const published = document.getElementById('f-vis-public').checked;

  if (!titre)   { toast('Le titre est obligatoire.', 'error'); return; }
  if (!content) { toast('Le contenu est vide.', 'error'); return; }

  const data = {
    titre,
    description: desc,
    categorie  : document.getElementById('f-cat').value,
    difficulty : document.getElementById('f-diff').value,
    time       : document.getElementById('f-time').value,
    emoji      : document.getElementById('f-emoji').value || '📚',
    image      : document.getElementById('f-image').value.trim(),
    content,
    published,
  };

  try {
    if (id) {
      TutoData.update(id, data, currentUser.id);
      toast('Tutoriel mis à jour !');
    } else {
      TutoData.create(data, currentUser);
      toast('Tutoriel créé ! 🎉');
    }
    resetForm();
    loadMyTutos();
    switchTab('my-tutos');
  } catch(e) {
    toast(e.message, 'error');
  }
}

async function editTuto(id) {
  const tutos = TutoData.getUserTutos(currentUser.id);
  const t     = tutos.find(x => x.id === id);
  if (!t) return;

  document.getElementById('edit-id').value       = t.id;
  document.getElementById('f-titre').value       = t.titre     || '';
  document.getElementById('f-cat').value         = t.categorie || 'Autre';
  document.getElementById('f-diff').value        = t.difficulty|| 'Facile';
  document.getElementById('f-time').value        = t.time      || 15;
  document.getElementById('f-emoji').value       = t.emoji     || '📚';
  document.getElementById('f-image').value       = t.image     || '';
  document.getElementById('f-desc').value        = t.description|| '';
  document.getElementById('f-content').value     = t.content   || '';
  document.getElementById('f-vis-public').checked  = !!t.published;
  document.getElementById('f-vis-private').checked = !t.published;
  document.getElementById('form-title').textContent = '✏️ Modifier le tutoriel';
  highlightVis();

  switchTab('create');
}

function deleteTuto(id) {
  confirmDialog('Supprimer ce tutoriel ? Cette action est irréversible.', () => {
    try {
      TutoData.remove(id, currentUser.id);
      toast('Tutoriel supprimé.');
      loadMyTutos();
    } catch(e) { toast(e.message, 'error'); }
  });
}

function resetForm() {
  document.getElementById('edit-id').value       = '';
  document.getElementById('f-titre').value       = '';
  document.getElementById('f-cat').value         = 'Bricolage';
  document.getElementById('f-diff').value        = 'Facile';
  document.getElementById('f-time').value        = 15;
  document.getElementById('f-emoji').value       = '📚';
  document.getElementById('f-image').value       = '';
  document.getElementById('f-desc').value        = '';
  document.getElementById('f-content').value     = '';
  document.getElementById('f-vis-private').checked = true;
  document.getElementById('f-vis-public').checked  = false;
  document.getElementById('form-title').textContent = '➕ Créer un tutoriel';
  highlightVis();
}
    }
/* ── Changer mot de passe ── */
async function changePwd() {
  const err = document.getElementById('pwd-error');
  const ok  = document.getElementById('pwd-success');
  const old = document.getElementById('pwd-old').value;
  const n1  = document.getElementById('pwd-new').value;
  const n2  = document.getElementById('pwd-new2').value;

  err.style.display = ok.style.display = 'none';
  if (n1 !== n2) { err.textContent = 'Les mots de passe ne correspondent pas.'; err.style.display = 'block'; return; }

  try {
    await Auth.changePassword(currentUser.id, old, n1);
    ok.textContent = 'Mot de passe mis à jour !';
    ok.style.display = 'block';
    document.getElementById('pwd-old').value = '';
    document.getElementById('pwd-new').value = '';
    document.getElementById('pwd-new2').value = '';
  } catch(e) {
    err.textContent = e.message;
    err.style.display = 'block';
  }
}
</script>
</body>
</html>
