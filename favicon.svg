<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bulbGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFEB3B;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Rayons extérieurs (bleus) -->
  <g id="rays" fill="none" stroke="#0066FF" stroke-width="6" stroke-linecap="round" filter="url(#glow)">
    <!-- Rayon haut -->
    <line x1="100" y1="8" x2="100" y2="26"/>
    <!-- Rayon haut-droit -->
    <line x1="148" y1="18" x2="165" y2="32"/>
    <!-- Rayon droit -->
    <line x1="192" y1="100" x2="174" y2="100"/>
    <!-- Rayon bas-droit -->
    <line x1="165" y1="168" x2="148" y2="182"/>
    <!-- Rayon bas -->
    <line x1="100" y1="192" x2="100" y2="174"/>
    <!-- Rayon bas-gauche -->
    <line x1="52" y1="182" x2="35" y2="168"/>
    <!-- Rayon gauche -->
    <line x1="8" y1="100" x2="26" y2="100"/>
    <!-- Rayon haut-gauche -->
    <line x1="35" y1="32" x2="52" y2="18"/>
  </g>
  
  <!-- Cercle bleu extérieur (contour de l'ampoule) -->
  <circle cx="100" cy="95" r="45" fill="none" stroke="#0066FF" stroke-width="7"/>
  
  <!-- Corps principal de l'ampoule (jaune) -->
  <ellipse cx="100" cy="85" rx="38" ry="42" fill="url(#bulbGradient)" filter="url(#glow)"/>
  
  <!-- Lumière blanche sur l'ampoule (brillance) -->
  <ellipse cx="85" cy="70" rx="12" ry="18" fill="#FFFFFF" opacity="0.4"/>
  
  <!-- Vis/base de l'ampoule (grise) -->
  <g id="socket">
    <!-- Spirale supérieure -->
    <rect x="85" y="125" width="30" height="3" rx="1.5" fill="#0066FF"/>
    <!-- Spirale inférieure -->
    <rect x="82" y="132" width="36" height="3" rx="1.5" fill="#0066FF"/>
    <!-- Culot (base noire) -->
    <rect x="90" y="140" width="20" height="12" rx="2" fill="#333333"/>
    <!-- Petit contact -->
    <circle cx="100" cy="153" r="4" fill="#666666"/>
  </g>
  
  <!-- Filament interne (léger) -->
  <path d="M 95 95 Q 100 110 105 95" fill="none" stroke="#FFB300" stroke-width="2" opacity="0.6"/>
</svg>
