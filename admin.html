<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <!-- Anti-flash dark mode -->
  <script>if(localStorage.getItem("tf_dark")==="true")document.documentElement.classList.add("dark");</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — TutoFacile</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/nav.css">
  <link rel="stylesheet" href="css/pages.css">
  <style>
    /* Styles spécifiques admin */
    body { overflow: hidden; }
    .admin-wrap  { display: grid; grid-template-columns: 260px 1fr; height: 100vh; }
    .admin-topbar {
      grid-column: 1/-1;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; height: 56px;
      background: var(--bg-soft); border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    .admin-topbar-logo { font-weight: 800; display: flex; align-items: center; gap: 10px; }
    .admin-topbar-right { display: flex; align-items: center; gap: 10px; font-size: 0.85rem; color: var(--text-light); }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    .admin-sidebar {
      background: var(--bg-soft); border-right: 1px solid var(--border);
      overflow-y: auto; padding: 16px 12px;
    }
    .admin-sidebar-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 12px; margin-bottom: 8px;
      font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-light); font-weight: 700;
    }
    .admin-main { overflow-y: auto; padding: 24px; }
    .admin-main h2 { font-size: 1.4rem; margin-bottom: 20px; }

    /* Ligne tuto admin */
    .admin-row {
      display: grid; grid-template-columns: 1fr auto auto auto;
      gap: 12px; align-items: center;
      padding: 12px 16px; border-radius: var(--r-md);
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem; transition: background var(--t);
    }
    .admin-row:last-child { border-bottom: none; }
    .admin-row:hover { background: var(--bg-muted); }
    .admin-row-title { font-weight: 600; }
    .admin-row-meta  { font-size: 0.8rem; color: var(--text-light); }

    /* Users tab */
    .user-row {
      display: grid; grid-template-columns: 1fr auto auto auto;
      gap: 12px; align-items: center; padding: 12px 16px;
      border-bottom: 1px solid var(--border); font-size: 0.9rem;
    }

    @media (max-width: 768px) {
      .admin-wrap { grid-template-columns: 1fr; }
      .admin-sidebar { display: none; }
      body { overflow: auto; }
    }
  </style>
</head>
<body>

<!-- ══ PAGE LOGIN ══ -->
<div id="admin-login" style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg-soft)">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">🛡️</div>
      <h1>Administration</h1>
      <p>Accès réservé — TutoFacile</p>
    </div>

    <div id="a-error" class="alert alert-danger" style="display:none"></div>

    <div class="form-group">
      <label>Identifiant admin</label>
      <input type="text" id="a-user" class="form-control" placeholder="admin" autocomplete="username">
    </div>
    <div class="form-group">
      <label>Mot de passe</label>
      <input type="password" id="a-pass" class="form-control" placeholder="••••••••" autocomplete="current-password">
      <p class="admin-token-hint" style="margin-top:8px">
        Pour changer le mot de passe admin : générer un hash SHA-256 sur
        <a href="https://emn178.github.io/online-tools/sha256.html" target="_blank">emn178.github.io</a>
        et remplacer <code>ADMIN_PASS_HASH</code> dans <code>js/auth.js</code>.
      </p>
    </div>

    <button class="btn btn-primary btn-full btn-lg" id="a-btn" onclick="doAdminLogin()">
      Accéder à l'admin
    </button>
  </div>
</div>

<!-- ══ PAGE ADMIN ══ -->
<div id="admin-panel" style="display:none">
  <div class="admin-wrap">

    <!-- Topbar (row 1, spans both cols) -->
    <div class="admin-topbar" style="grid-row:1;grid-column:1/-1">
      <div class="admin-topbar-logo">
        <div class="nav-logo-icon">🎓</div>
        TutoFacile <span style="font-size:0.75rem;font-weight:400;color:var(--text-light);margin-left:8px">Admin</span>
      </div>
      <div class="admin-topbar-right">
        <span class="status-dot"></span>
        <span id="admin-conn-info">Connecté</span>
        <button class="btn btn-ghost btn-sm" onclick="doAdminLogout()">Déconnexion</button>
        <button class="dark-toggle" style="margin-left:4px">🌙</button>
      </div>
    </div>

    <!-- Sidebar -->
    <aside class="admin-sidebar" style="grid-row:2">
      <div class="admin-sidebar-header">
        Tutoriels <span id="tutos-count" style="font-weight:400;color:var(--text-light)"></span>
        <button class="btn btn-ghost btn-sm" onclick="loadAdminData()" title="Rafraîchir">⟳</button>
      </div>
      <div id="admin-tutos-list">
        <div class="loader" style="width:24px;height:24px;margin:20px auto"></div>
      </div>
    </aside>

    <!-- Main -->
    <main class="admin-main" style="grid-row:2">

      <div id="admin-tab-tutos">
        <h2>📚 Gestion des tutoriels</h2>
        <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap">
          <button class="btn btn-primary btn-sm" onclick="showAdminTab('users')">👥 Voir les utilisateurs</button>
          <button class="btn btn-ghost btn-sm" onclick="loadAdminData()">⟳ Rafraîchir</button>
        </div>
        <div id="admin-tutos-table">
          <div class="loader"></div>
        </div>
      </div>

      <div id="admin-tab-users" style="display:none">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
          <h2>👥 Utilisateurs</h2>
          <button class="btn btn-ghost btn-sm" onclick="showAdminTab('tutos')">← Retour tutoriels</button>
        </div>
        <div id="admin-users-table">
          <div class="loader"></div>
        </div>
      </div>

    </main>
  </div>
</div>

<script src="js/nav.js"></script>
<script src="js/auth.js"></script>
<script src="js/data.js"></script>
<script>
/* ── Vérifier session admin au chargement ── */
Auth.isAdminAuthenticated().then(ok => {
  if (ok) showAdminPanel();
});

async function doAdminLogin() {
  const btn  = document.getElementById('a-btn');
  const err  = document.getElementById('a-error');
  const user = document.getElementById('a-user').value.trim();
  const pass = document.getElementById('a-pass').value;

  err.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Connexion…';

  try {
    const ok = await Auth.adminLogin(user, pass);
    if (!ok) throw new Error('Identifiant ou mot de passe incorrect.');
    showAdminPanel();
  } catch(e) {
    err.textContent = e.message;
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Accéder à l\'admin';
  }
}

function showAdminPanel() {
  document.getElementById('admin-login').style.display = 'none';
  document.getElementById('admin-panel').style.display = '';
  loadAdminData();
  applyDark();
}

function doAdminLogout() {
  Auth.adminLogout();
  document.getElementById('admin-login').style.display = 'flex';
  document.getElementById('admin-panel').style.display = 'none';
}

function showAdminTab(tab) {
  document.getElementById('admin-tab-tutos').style.display = tab === 'tutos' ? '' : 'none';
  document.getElementById('admin-tab-users').style.display = tab === 'users' ? '' : 'none';
  if (tab === 'users') loadUsersTable();
}

/* ── Données admin ── */
async function loadAdminData() {
  const tutos = await TutoData.getAll();
  document.getElementById('tutos-count').textContent = `(${tutos.length})`;
  renderAdminTutos(tutos);
  renderSidebarList(tutos);
}

function renderSidebarList(tutos) {
  const el = document.getElementById('admin-tutos-list');
  if (!tutos.length) { el.innerHTML = '<p style="padding:12px;color:var(--text-light);font-size:0.85rem">Aucun tutoriel</p>'; return; }
  el.innerHTML = tutos.slice(0, 30).map(t => `
    <div style="padding:8px 12px;border-radius:var(--r-md);cursor:pointer;transition:background var(--t);font-size:0.85rem"
         onmouseover="this.style.background='var(--bg-muted)'" onmouseout="this.style.background=''"
         onclick="scrollToTuto('${t.id}')">
      <div style="font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${t.titre||'Sans titre'}</div>
      <div style="font-size:0.75rem;color:var(--text-light)">${t.categorie||''} · ${t.authorName||'Système'}</div>
    </div>`).join('');
}

function renderAdminTutos(tutos) {
  const el = document.getElementById('admin-tutos-table');
  if (!tutos.length) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><h3>Aucun tutoriel</h3></div>'; return; }
  el.innerHTML = `
    <div style="background:var(--bg);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden">
      ${tutos.map(t => `
        <div class="admin-row" id="row-${t.id}">
          <div>
            <div class="admin-row-title">${t.titre||'Sans titre'}</div>
            <div class="admin-row-meta">${t.categorie||''} · ${t.difficulty||''} · ${t.time||'?'} min · par ${t.authorName||'Système'}</div>
          </div>
          <span class="badge badge-${t.difficulty==='Facile'?'success':t.difficulty==='Moyen'?'warning':'danger'}">${t.difficulty||'—'}</span>
          <a href="tuto.html?id=${t.id}" target="_blank" class="btn btn-ghost btn-sm">👁️</a>
          <button class="btn btn-danger btn-sm" onclick="adminDeleteTuto('${t.id}','${(t.titre||'').replace(/'/g,'\\\'').substring(0,30)}')">🗑️</button>
        </div>`).join('')}
    </div>`;
}

function scrollToTuto(id) {
  const el = document.getElementById('row-' + id);
  if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); el.style.background = 'var(--primary-light)'; setTimeout(() => el.style.background = '', 1500); }
}

function adminDeleteTuto(id, title) {
  confirmDialog(`Supprimer "${title}" ? Action irréversible.`, async () => {
    try {
      TutoData.remove(id, null, true);
      toast('Tutoriel supprimé.');
      loadAdminData();
    } catch(e) { toast(e.message, 'error'); }
  });
}

/* ── Table utilisateurs ── */
function loadUsersTable() {
  const users = JSON.parse(localStorage.getItem('tf_users') || '[]');
  const el    = document.getElementById('admin-users-table');
  if (!users.length) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">👥</div><h3>Aucun utilisateur inscrit</h3></div>'; return; }
  el.innerHTML = `
    <div style="background:var(--bg);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden">
      <div class="user-row" style="font-size:0.75rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-light);border-bottom:2px solid var(--border)">
        <span>Utilisateur</span><span>Email</span><span>Inscrit le</span><span>Actions</span>
      </div>
      ${users.map(u => `
        <div class="user-row">
          <div>
            <strong>${u.username}</strong>
            <div style="font-size:0.8rem;color:var(--text-light)">${TutoData.getUserTutos(u.id).length} tuto(s)</div>
          </div>
          <span style="font-size:0.85rem;color:var(--text-light)">${u.email}</span>
          <span style="font-size:0.8rem;color:var(--text-light)">${new Date(u.createdAt).toLocaleDateString('fr-FR')}</span>
          <button class="btn btn-danger btn-sm" onclick="adminDeleteUser('${u.id}','${u.username}')">Suppr.</button>
        </div>`).join('')}
    </div>`;
}

function adminDeleteUser(id, name) {
  confirmDialog(`Supprimer l'utilisateur "${name}" et tous ses tutoriels ?`, () => {
    const users = JSON.parse(localStorage.getItem('tf_users') || '[]').filter(u => u.id !== id);
    localStorage.setItem('tf_users', JSON.stringify(users));
    /* Supprimer aussi ses tutos */
    const custom = JSON.parse(localStorage.getItem('tf_custom_tutos') || '[]').filter(t => t.authorId !== id);
    localStorage.setItem('tf_custom_tutos', JSON.stringify(custom));
    toast(`Utilisateur "${name}" supprimé.`);
    loadUsersTable();
  });
}

/* Enter pour login */
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('admin-login').style.display !== 'none') doAdminLogin();
});
</script>
</body>
</html>
